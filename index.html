<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Reading Bloom</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="widget">

  <div class="bloom-container">

    <svg
      id="bloom"
      viewBox="0 0 300 300"
      preserveAspectRatio="xMidYMid meet"
    >
      <g id="petals"></g>
    </svg>

    <div class="center">
      <div id="streak" class="streak-number">0</div>
      <div class="label">days</div>
    </div>

  </div>

  <button id="readBtn">
    I Read Today
  </button>

  <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
